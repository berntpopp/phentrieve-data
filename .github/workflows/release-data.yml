name: Build HPO Data Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag declared by a committed JSON spec.
        required: true
        type: choice
        options:
          - hpo-v2026-06-23-r1

permissions:
  contents: write

jobs:
  build:
    uses: berntpopp/phentrieve/.github/workflows/build-data-bundles.yml@48a489ea61b94c70c8fb3c089df35234b8f2ec18
    with:
      release_tag: ${{ inputs.release_tag }}
      release_spec_path: releases/${{ inputs.release_tag }}.json
      source_commit: 48a489ea61b94c70c8fb3c089df35234b8f2ec18
