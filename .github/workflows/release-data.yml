name: Build HPO Data Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag declared by a committed JSON spec.
        required: true
        type: choice
        options:
          - hpo-v2026-06-23-r1

permissions:
  contents: write

jobs:
  build:
    uses: berntpopp/phentrieve/.github/workflows/build-data-bundles.yml@b5dc097fe81a82e07f81053113e9748a6eda28e9
    with:
      release_tag: ${{ inputs.release_tag }}
      release_spec_path: releases/${{ inputs.release_tag }}.json
      source_commit: b5dc097fe81a82e07f81053113e9748a6eda28e9
