name: Build HPO Data Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag declared by a committed JSON spec.
        required: true
        type: choice
        options:
          - hpo-v2026-06-23-r1

permissions:
  contents: write

jobs:
  build:
    uses: berntpopp/phentrieve/.github/workflows/build-data-bundles.yml@b6c50c1f0e12eb2aae83471b0680760ee35f6a88
    with:
      release_tag: ${{ inputs.release_tag }}
      release_spec_path: releases/${{ inputs.release_tag }}.json
      source_commit: b6c50c1f0e12eb2aae83471b0680760ee35f6a88
