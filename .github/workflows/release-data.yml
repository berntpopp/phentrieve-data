name: Build HPO Data Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag declared by a committed JSON spec.
        required: true
        type: choice
        options:
          - hpo-v2026-06-23-r1

permissions:
  contents: write

jobs:
  build:
    uses: berntpopp/phentrieve/.github/workflows/build-data-bundles.yml@c0d76d42f0c77b0b0ff72b3238fae3646c6e9fa1
    with:
      release_tag: ${{ inputs.release_tag }}
      release_spec_path: releases/${{ inputs.release_tag }}.json
      source_commit: c0d76d42f0c77b0b0ff72b3238fae3646c6e9fa1
